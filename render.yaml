# Render Blueprint — deploy Postgres + API from this repo.
# In the Render dashboard: New → Blueprint → select this repository.
#
# After the API is live, deploy the frontend on Vercel with:
#   Root Directory: frontend/assignmentHub
#   Env: VITE_API_URL=https://YOUR-API.onrender.com/api
# Then set CLIENT_URL on this API service to your Vercel URL.

databases:
  - name: assignment-hub-db
    plan: free
    databaseName: assignment_hub
    user: assignment_hub

services:
  - type: web
    name: assignment-hub-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: assignment-hub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false
      - key: PORT
        value: 10000
